<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SurfCoach Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #1a6aff;
    --black: #0d0d0d;
    --gray-1: #f5f5f5;
    --gray-2: #e8e8e8;
    --gray-3: #999;
    --green: #00994d;
    --white: #ffffff;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--gray-1);
    color: var(--black);
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
  }

  [dir="ltr"] { text-align: left; }
  [dir="rtl"] { text-align: right; }

  .header {
    background: var(--black);
    color: var(--white);
    padding: 20px 16px 16px;
  }

  .header-brand {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 12px;
  }

  .header-main {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .header-identity {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .surfer-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
  }

  .surfer-avatar-fallback {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: rgba(255,255,255,0.6);
    flex-shrink: 0;
  }

  .surfer-name {
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .wave-badge {
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 500;
    padding: 4px 8px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 2px;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .wave-badge.tube {
    border-color: var(--green);
    color: var(--green);
  }

  .header-meta {
    display: flex;
    gap: 16px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.1);
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .meta-label {
    font-family: var(--mono);
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray-3);
  }

  .meta-value {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--white);
  }

  /* EVENTS */
  .events { padding: 8px 12px 12px; display: flex; flex-direction: column; gap: 10px; }

  .event {
    background: var(--white);
    border-radius: 4px;
    overflow: hidden;
  }

  /* IMAGE */
  .event-img-wrap {
    position: relative;
    background: var(--black);
  }

  .event-img {
    width: 100%;
    height: 210px;
    object-fit: cover;
    object-position: top left;
    display: block;
  }

  .event-img-placeholder {
    width: 100%;
    height: 210px;
    background: var(--gray-2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gray-3);
    font-family: var(--mono);
    font-size: 0.8rem;
  }

  .img-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.55);
    color: white;
    border: none;
    width: 34px;
    height: 34px;
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  .img-arrow:active { background: rgba(0,0,0,0.85); }
  .img-arrow-prev { left: 8px; }
  .img-arrow-next { right: 8px; }

  /* FRAME BAR — sits between image and event body */
  .frame-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    background: var(--black);
  }

  .frame-num {
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--white);
    letter-spacing: 0.04em;
    min-width: 36px;
  }

  /* scrubber track */
  .frame-scrubber {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
  }

  .frame-scrubber-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 2px;
  }

  .frame-scrubber.tube .frame-scrubber-fill {
    background: var(--green);
  }

  /* role label */
  .frame-role {
    font-family: var(--mono);
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    min-width: 34px;
    text-align: right;
  }

  [dir="rtl"] .frame-role { text-align: left; }

  .frame-role.is-start { color: rgba(255,255,255,0.65); }
  .frame-role.is-peak  { color: var(--blue); }
  .frame-role.is-end   { color: rgba(255,255,255,0.65); }
  .frame-role.tube.is-peak { color: var(--green); }

  /* EVENT BODY */
  .event-body { padding: 12px 14px; }

  .event-type {
    font-family: var(--mono);
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 6px;
  }

  .event-type.tube { color: var(--green); }

  .event-analysis {
    font-size: 0.92rem;
    line-height: 1.55;
    color: var(--black);
  }

  /* RATING */
  .rating-box {
    background: var(--white);
    margin: 0 12px 12px;
    padding: 16px;
    border-radius: 4px;
    text-align: center;
  }

  .rating-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray-3);
    margin-bottom: 12px;
  }

  .rating-circles { display: flex; justify-content: center; gap: 10px; }

  .rating-circle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1.5px solid var(--gray-2);
    color: var(--black);
    font-family: var(--mono);
    font-size: 0.9rem;
    font-weight: 500;
    background: var(--white);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
  }

  .rating-circle:hover { border-color: var(--blue); color: var(--blue); }

  .rating-thanks {
    font-size: 0.85rem;
    color: var(--gray-3);
    padding: 8px 0;
  }

  .footer {
    background: var(--black);
    color: rgba(255,255,255,0.4);
    text-align: center;
    padding: 16px;
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .state {
    padding: 40px 16px;
    text-align: center;
    color: var(--gray-3);
    font-family: var(--mono);
    font-size: 0.8rem;
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
window.LANG = 'he';
const frameState = {};

const T = {
  he: {
    brand: 'SURF ANALYSIS',
    loading: 'טוען...',
    errorPrefix: 'שגיאה: ',
    missingParams: 'חסרים פרמטרים ב-URL',
    sessionNotFound: 'לא נמצא session.json',
    date: 'תאריך',
    wave: 'גל',
    frames: 'פריימים',
    fps: 'FPS',
    tube: 'TUBE',
    ratingLabel: 'דרג את הניתוח',
    ratingThanks: 'תודה על הפידבק',
    noImage: 'אין תמונה',
    footer: name => `${name} · SURFCOACH`,
    roles: { start: 'START', peak: 'PEAK', mid: '', end: 'END' },
    types: {
      popup_execution:    'קימה',
      bottom_turn:        'תפנית תחתית',
      top_turn:           'תפנית עליונה',
      barrel_entry:       'כניסה לצינור',
      tube_ride:          'רכיבת צינור',
      controlled_exit:    'יציאה מבוקרת',
      wipeout_management: 'נפילה',
      pump:               'פאמפ',
      ride_end:           'סיום גל'
    }
  },
  en: {
    brand: 'SURF ANALYSIS',
    loading: 'Loading...',
    errorPrefix: 'Error: ',
    missingParams: 'Missing URL parameters',
    sessionNotFound: 'session.json not found',
    date: 'Date',
    wave: 'Wave',
    frames: 'Frames',
    fps: 'FPS',
    tube: 'TUBE',
    ratingLabel: 'Rate the analysis',
    ratingThanks: 'Thanks for your feedback',
    noImage: 'No image',
    footer: name => `${name} · SURFCOACH`,
    roles: { start: 'START', peak: 'PEAK', mid: '', end: 'END' },
    types: {
      popup_execution:    'Pop-up',
      bottom_turn:        'Bottom Turn',
      top_turn:           'Top Turn',
      barrel_entry:       'Barrel Entry',
      tube_ride:          'Tube Ride',
      controlled_exit:    'Controlled Exit',
      wipeout_management: 'Wipeout',
      pump:               'Pump',
      ride_end:           'Ride End'
    }
  }
};

function t(key, ...args) {
  const lang = T[window.LANG] ?? T['en'];
  const entry = lang[key];
  return typeof entry === 'function' ? entry(...args) : (entry ?? key);
}

function typeLabel(type) {
  return (T[window.LANG] ?? T['en']).types[type] || type.replace(/_/g, ' ');
}

function roleLabel(role) {
  return (T[window.LANG] ?? T['en']).roles[role] ?? '';
}

function isTubeType(type) {
  return ['tube_ride', 'barrel_entry', 'controlled_exit'].includes(type);
}

// ── FRAME NAVIGATION ──────────────────────────────────────────

function updateFrameUI(eventId, index) {
  const card  = document.querySelector(`.event[data-id="${eventId}"]`);
  const frames = JSON.parse(card.dataset.frames);
  const total  = frames.length;
  if (index < 0 || index >= total) return;

  frameState[eventId] = index;
  const f    = frames[index];
  const type = card.dataset.type;

  // image
  const img = document.getElementById(`img-${eventId}`);
  if (img) img.src = `${window.FRAME_BASE}/${f.filename}`;

  // frame number
  const numEl = document.getElementById(`fnum-${eventId}`);
  if (numEl) numEl.textContent = `F${f.num}`;

  // role badge
  const roleEl = document.getElementById(`frole-${eventId}`);
  if (roleEl) {
    roleEl.textContent = roleLabel(f.role);
    let cls = 'frame-role';
    if (f.role === 'start') cls += ' is-start';
    if (f.role === 'peak')  cls += ' is-peak';
    if (f.role === 'end')   cls += ' is-end';
    if (f.role === 'peak' && isTubeType(type)) cls += ' tube';
    roleEl.className = cls;
  }

  // scrubber fill
  const fill = document.getElementById(`sfill-${eventId}`);
  if (fill) {
    const pct = total > 1 ? (index / (total - 1)) * 100 : 100;
    fill.style.width = pct + '%';
  }
}

function shiftFrame(eventId, dir) {
  const card  = document.querySelector(`.event[data-id="${eventId}"]`);
  const total = JSON.parse(card.dataset.frames).length;
  const cur   = frameState[eventId] ?? 0;
  updateFrameUI(eventId, Math.max(0, Math.min(total - 1, cur + dir)));
}

function scrubberClick(eventId, e) {
  const bar   = document.getElementById(`scrub-${eventId}`);
  const card  = document.querySelector(`.event[data-id="${eventId}"]`);
  const total = JSON.parse(card.dataset.frames).length;
  const rect  = bar.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  updateFrameUI(eventId, Math.round(ratio * (total - 1)));
}

// ── EVENT CARD HTML ────────────────────────────────────────────

function eventHtml(ev) {
  if (!ev.analysis) return '';

  const isTube  = isTubeType(ev.type);
  const frames  = ev.frames || [];
  const first   = frames[0];

  const mainImg = first
    ? `<img class="event-img" id="img-${ev.event_id}"
          src="${window.FRAME_BASE}/${first.filename}"
          alt="F${first.num}"
          onerror="this.outerHTML='<div class=\\'event-img-placeholder\\'>${t('noImage')}</div>'">`
    : `<div class="event-img-placeholder">${t('noImage')}</div>`;

  const firstRole = first?.role ?? '';
  let roleCls = 'frame-role';
  if (firstRole === 'start') roleCls += ' is-start';
  if (firstRole === 'peak')  roleCls += ' is-peak';
  if (firstRole === 'end')   roleCls += ' is-end';
  if (firstRole === 'peak' && isTube) roleCls += ' tube';

  const framesJson = JSON.stringify(frames).replace(/"/g, '&quot;');

  return `
<div class="event" data-id="${ev.event_id}" data-frames="${framesJson}" data-type="${ev.type}">
  <div class="event-img-wrap">
    ${mainImg}
    <button class="img-arrow img-arrow-prev" onclick="shiftFrame(${ev.event_id}, -1)">&#8249;</button>
    <button class="img-arrow img-arrow-next" onclick="shiftFrame(${ev.event_id},  1)">&#8250;</button>
  </div>

  <div class="frame-bar">
    <span class="frame-num" id="fnum-${ev.event_id}">F${first?.num ?? ''}</span>
    <div class="frame-scrubber${isTube ? ' tube' : ''}"
         id="scrub-${ev.event_id}"
         onclick="scrubberClick(${ev.event_id}, event)">
      <div class="frame-scrubber-fill" id="sfill-${ev.event_id}" style="width:0%"></div>
    </div>
    <span class="${roleCls}" id="frole-${ev.event_id}">${roleLabel(firstRole)}</span>
  </div>

  <div class="event-body">
    <div class="event-type${isTube ? ' tube' : ''}">${typeLabel(ev.type)}</div>
    <div class="event-analysis">${ev.analysis}</div>
  </div>
</div>`;
}

// ── RENDER ─────────────────────────────────────────────────────

function render(d) {
  const isRtl = window.LANG === 'he';
  document.documentElement.lang = window.LANG;
  document.documentElement.dir  = isRtl ? 'rtl' : 'ltr';
  document.body.style.direction  = isRtl ? 'rtl' : 'ltr';

  const tubeBadge = d.hasTube
    ? `<span class="wave-badge tube">${t('tube')}</span>`
    : `<span class="wave-badge">${d.waveLevel}</span>`;

  const avatarUrl  = `https://raw.githubusercontent.com/ZoharPilot/surfcoach-analyze/main/users/${window.CURRENT_USER}/photo.jpg`;
  const avatarHtml = `<img class="surfer-avatar"
    src="${avatarUrl}" alt="${d.surferName}"
    onerror="this.outerHTML='<div class=\\'surfer-avatar-fallback\\'>${d.surferName.charAt(0).toUpperCase()}</div>'">`;

  const eventsHtml = (d.events || [])
    .filter(ev => ev.analysis && ev.analysis.trim())
    .map(eventHtml).join('');

  const ratingCircles = [1,2,3,4,5]
    .map(n => `<button class="rating-circle" onclick="submitRating(${n})">${n}</button>`)
    .join('');

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-brand">${t('brand')}</div>
      <div class="header-main">
        <div class="header-identity">
          ${avatarHtml}
          <div class="surfer-name">${d.surferName}</div>
        </div>
        ${tubeBadge}
      </div>
      <div class="header-meta">
        <div class="meta-item">
          <span class="meta-label">${t('date')}</span>
          <span class="meta-value">${d.date ?? '—'}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">${t('wave')}</span>
          <span class="meta-value">${d.waveLevel}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">${t('frames')}</span>
          <span class="meta-value">${d.totalFrames}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">${t('fps')}</span>
          <span class="meta-value">${d.fps}</span>
        </div>
      </div>
    </div>

    <div class="events">${eventsHtml}</div>

    <div class="rating-box" id="rating-box">
      <div class="rating-label">${t('ratingLabel')}</div>
      <div class="rating-circles">${ratingCircles}</div>
    </div>

    <div class="footer">${t('footer', d.surferName)}</div>
  `;
}

function submitRating(val) {
  document.getElementById('rating-box').innerHTML =
    `<div class="rating-thanks">${t('ratingThanks')}</div>`;
}

// ── LOAD ───────────────────────────────────────────────────────

async function load() {
  const params  = new URLSearchParams(window.location.search);
  const user    = params.get('user');
  const session = params.get('session');
  const wave    = params.get('wave');
  const lang    = params.get('lang') ?? 'he';

  window.LANG         = lang;
  window.CURRENT_USER = user;
  document.documentElement.lang = lang;
  document.documentElement.dir  = lang === 'he' ? 'rtl' : 'ltr';

  document.getElementById('app').innerHTML = `<div class="state">${t('loading')}</div>`;

  try {
    if (!user || !session || !wave) throw new Error(t('missingParams'));

    window.FRAME_BASE = `https://raw.githubusercontent.com/ZoharPilot/surfcoach-analyze/main/users/${user}/${session}/${wave}`;

    const res = await fetch(`${window.FRAME_BASE}/session.json`);
    if (!res.ok) throw new Error(t('sessionNotFound'));
    const data = await res.json();
    render(Array.isArray(data) ? data[0] : data);
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="state">${t('errorPrefix')}${e.message}</div>`;
  }
}

load();
</script>
</body>
</html>
